<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FurConnect | Appointment Registration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <section id="mainSystem">
    <div class="container-fluid p-0 overflow-hidden">

      <nav class="sidebar">
        <div class="sidebar-inner">
          <div class="text-center mb-5 brand-wrap">
            <img src="../pics/paw2.png" alt="paw" class="sidebar-logo mb-2">
            <h2 class="fw-bold">FurConnect</h2>
          </div>

          <a href="dashboard.html" id="btn-dashboard" class="btn btn-light nav-btn-custom">Dashboard</a>

          <div class="appointment-nav-dropdown open" id="appointmentDropdown">
            <button id="btn-appointment" class="btn btn-light nav-btn-custom appointment-main-btn active-nav" type="button">
              <span>Appointment</span>
              <span class="nav-arrow">⌄</span>
            </button>

            <div class="appointment-dropdown-menu">
              <a href="registration.html" class="dropdown-link-btn active">Registration</a>
              <a href="appointments.html" class="dropdown-link-btn">Appointments</a>
              <a href="appointment-logs.html" class="dropdown-link-btn">Appointment Logs</a>
            </div>
          </div>

          <div class="appointment-nav-dropdown" id="recordsDropdown">
            <button id="btn-records" class="btn btn-light nav-btn-custom appointment-main-btn" type="button">
              <span>Patient Records</span>
              <span class="nav-arrow">⌄</span>
            </button>

            <div class="appointment-dropdown-menu">
              <a href="records.html" class="dropdown-link-btn">Pet Records</a>
              <a href="archived-records.html" class="dropdown-link-btn">Archived Pet Records</a>
            </div>
          </div>


          <a href="inventory.html" id="btn-inventory" class="btn btn-light nav-btn-custom">Inventory</a>

          <!-- <div class="appointment-nav-dropdown" id="employeesDropdown">
            <button id="btn-employees" class="btn btn-light nav-btn-custom appointment-main-btn" type="button">
              <span>Employees</span>
              <span class="nav-arrow">⌄</span>
            </button> -->

            <!-- <div class="appointment-dropdown-menu">
              <a href="employees.html" class="dropdown-link-btn">Employee List</a>
              <a href="attendance.html" class="dropdown-link-btn">Attendance</a>
              <a href="payroll.html" class="dropdown-link-btn">Payroll</a>
              <a href="archived-payroll.html" class="dropdown-link-btn">Archived Payroll</a>
              <a href="archived-employees.html" class="dropdown-link-btn">Archived Employees</a>
            </div>
          </div> -->

          <div class="logout-wrap">
            <a href="login.html" id="logoutBtn" class="btn btn-light nav-btn-custom">Logout</a>
          </div>
        </div>
      </nav>


      <main class="page-area p-4 p-lg-5">

        <section id="registerPage" class="internal-page">
          <div class="page-title-wrap">
            <h1 class="display-6">Registration</h1>
            <p class="fs-5">Please fill all the information to set register</p>
          </div>

          <div class="card register-panel">
            <div class="card-body p-4 p-md-5">
              <form id="registerForm">
                
                <input type="hidden" id="appointmentDate" required>
                <input type="hidden" id="appointmentTime" required>

                <div class="register-three-layout">

<div class="register-section-card">
  <div class="section-title">Pet's Information</div>

  <div class="form-grid-2">
    <div class="form-field">
      <label class="custom-label">Patient ID</label>
      <input id="recordId" class="form-control custom-input" type="text">
    </div>

    <div class="form-field">
      <label class="custom-label">Pet Name</label>
      <input id="petName" class="form-control custom-input" type="text">
    </div>

    <div class="form-field">
      <label class="custom-label">Pet Species</label>
      <div class="custom-dropdown" id="petSpeciesDropdown">
        <div class="dropdown-selected">
          Select Pet Species <span class="arrow">▼</span>
        </div>
        <div class="dropdown-options">
          <div data-value="Dog">Dog</div>
          <div data-value="Cat">Cat</div>
        </div>
      </div>
      <input type="hidden" id="petSpecies">
    </div>

    <div class="form-field">
      <label class="custom-label">Breed</label>
      <input id="breed" class="form-control custom-input" type="text">
    </div>

    <div class="form-field">
      <label class="custom-label">Age</label>
      <div class="age-row">
        <input id="age" class="form-control custom-input" type="number" min="0">
        <select id="ageUnit" class="form-select custom-input">
          <option value="Months">Months</option>
          <option value="Years">Years</option>
        </select>
      </div>
    </div>

    <div class="form-field">
      <label class="custom-label">Gender</label>
      <div class="custom-dropdown" id="genderDropdown">
        <div class="dropdown-selected">
          Select Gender <span class="arrow">▼</span>
        </div>
        <div class="dropdown-options">
          <div data-value="Male">Male</div>
          <div data-value="Female">Female</div>
        </div>
      </div>
      <input type="hidden" id="gender">
    </div>

    <div class="form-field full">
      <label class="custom-label">Weight (kg)</label>
      <input id="weight" class="form-control custom-input" type="text" inputmode="decimal">
    </div>
  </div>
</div>

<div class="register-section-card">
  <div class="section-title">Owner's Information</div>

  <div class="form-grid-2">
    <div class="form-field">
      <label class="custom-label">Owner Name</label>
      <input id="ownerName" class="form-control custom-input" type="text" pattern="[A-Za-z\s]+" title="Letters only" required>
    </div>

    <div class="form-field">
      <label class="custom-label">Contact Number</label>
      <input id="contactNumber" class="form-control custom-input" type="text" inputmode="numeric" required>
    </div>

    <div class="form-field">
      <label class="custom-label">Email</label>
      <input id="email" class="form-control custom-input" type="email" pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" title="Only @gmail.com emails are allowed" required>
    </div>
  </div>
</div>

                  

                </div>

                <div class="register-submit-wrap-new">
                  <button type="button" class="btn btn-set register-submit-btn" id="setAppointmentBtn">
                    Register
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>

      </main>
    </div>
  </section>

  <div id="notificationContainer" class="notif-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/registration.js"></script>
</body>
</html>
