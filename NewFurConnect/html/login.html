<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FurConnect | Login</title>

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="login-page">

  <main class="login-card">
    <div class="login-brand text-center mb-4">
      <img src="../pics/paw2.png" alt="FurConnect Logo" class="login-logo">
      <h2>FurConnect</h2>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="loginUsername" class="login-label">Username</label>
        <input
          type="text"
          id="loginUsername"
          class="form-control"
          placeholder="Enter username"
          autocomplete="username"
          required
        >
      </div>

      <div class="login-field">
        <label for="loginPassword" class="login-label">Password</label>

        <div class="password-field">
          <input
            type="password"
            id="loginPassword"
            class="form-control"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          >

          <button type="button" id="togglePasswordBtn" class="password-toggle-btn">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="login-field">
        <label for="loginRole" class="login-label">Role</label>
        <select id="loginRole" class="form-select login-role-select" required>
          <option value="" selected disabled>Select role</option>
          <option value="Admin">Admin</option>
          <option value="Staff">Staff</option>
        </select>
      </div>

      <p id="loginError" class="login-error hidden"></p>

      <button type="submit" class="btn login-btn w-100 mt-3">
        Login
      </button>
    </form>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
