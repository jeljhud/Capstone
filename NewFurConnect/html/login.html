<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FurConnect | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-brand text-center mb-4">
        <img src="../pics/paw2.png" alt="paw" class="login-logo mb-2">
        <h2 class="mb-1">FurConnect</h2>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="loginUsername" class="form-label login-label">Username</label>
          <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" required>
        </div>

<div class="mb-3">
  <label for="loginPassword" class="form-label login-label">Password</label>

  <div class="password-wrapper">
    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>

    <button type="button" id="togglePasswordBtn" class="password-eye">
      <i class="bi bi-eye"></i>
    </button>
  </div>
</div>

        <div id="loginError" class="login-error hidden"></div>

        <button type="submit" class="btn login-btn w-100 mt-2">
          Login
        </button>
      </form>
    </div>
  </section>

  <script src="../js/login.js"></script>
</body>
</html>
