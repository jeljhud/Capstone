<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FurConnect | Archived Appointments</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="furconnect.css">
</head>
<body>

  <section id="mainSystem">
    <div class="container-fluid p-0 overflow-hidden">

      <nav class="sidebar">
        <div class="sidebar-inner">
          <div class="text-center mb-5 brand-wrap">
            <img src="paw2.png" alt="paw" class="sidebar-logo mb-2">
            <h2 class="fw-bold">FurConnect</h2>
          </div>

          <a href="dashboard.html" id="btn-dashboard" class="btn btn-light nav-btn-custom">Dashboard</a>

          <div class="appointment-nav-dropdown open" id="appointmentDropdown">
            <button id="btn-appointment" class="btn btn-light nav-btn-custom appointment-main-btn active-nav" type="button">
              <span>Appointment</span>
              <span class="nav-arrow">⌄</span>
            </button>

            <div class="appointment-dropdown-menu">
              <a href="appointment.html" class="dropdown-link-btn">Registration</a>
              <a href="archived-appointment.html" class="dropdown-link-btn active">Archived Appointment</a>
            </div>
          </div>

          <div class="appointment-nav-dropdown" id="recordsDropdown">
            <button id="btn-records" class="btn btn-light nav-btn-custom appointment-main-btn" type="button">
              <span>Pet Records</span>
              <span class="nav-arrow">⌄</span>
            </button>

            <div class="appointment-dropdown-menu">
              <a href="records.html" class="dropdown-link-btn">Active Records</a>
              <a href="archived-records.html" class="dropdown-link-btn">Archived Records</a>
            </div>
          </div>

          <a href="inventory.html" id="btn-inventory" class="btn btn-light nav-btn-custom">Inventory</a>

 <!-- <div class="appointment-nav-dropdown" id="employeesDropdown">
            <button id="btn-employees" class="btn btn-light nav-btn-custom appointment-main-btn" type="button">
              <span>Employees</span>
              <span class="nav-arrow">⌄</span>
            </button>

            <div class="appointment-dropdown-menu">
              <a href="employees.html" class="dropdown-link-btn">Employee List</a>
              <a href="attendance.html" class="dropdown-link-btn">Attendance</a>
              <a href="payroll.html" class="dropdown-link-btn">Payroll</a>
              <a href="archived-payroll.html" class="dropdown-link-btn">Archived Payroll</a>
              <a href="archived-employees.html" class="dropdown-link-btn">Archived Employees</a>
            </div>
          </div> --> 

          <div class="logout-wrap">
            <a href="login.html" id="logoutBtn" class="btn btn-danger w-100">Logout</a>
          </div>
        </div>
      </nav>

      <main class="page-area p-4 p-lg-5">

        <section id="recentAppointmentsPage" class="internal-page">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
            <div>
              <h1 class="display-5">Archived Appointment</h1>
              <p class="fs-5">View completed or past appointments</p>
            </div>

            <div class="records-tools top tools">
              <input type="date" class="form-control search-box" id="archivedAppointmentDateFilter">

              <input type="text" class="form-control search-box" id="archivedAppointmentSearch" placeholder="Search">

              <button class="btn btn-action px-4" id="exportArchivedAppointmentsBtn" type="button">
                Export Excel
              </button>
            </div>
          </div>

          <div class="card dashboard-soft-card">
            <div class="card-body p-4">
              <div class="table-responsive">
                <table class="table dashboard-table align-middle mb-0">
                  <thead>
                    <tr>
                      <th class="record-sortable-th" data-table="appointments" data-sort="id">ID</th>
                      <th>Pet Name</th>
                      <th>Owner</th>
                      <th>Schedule</th>
                      <th>Appointment</th>
                      <th>Status</th>
                      <th>Archived Date</th>
                    </tr>
                  </thead>

                  <tbody id="archivedAppointmentsBody">
                    <tr>
                      <td colspan="7" class="text-center text-muted py-4">
                        No archived appointments found.
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>
  </section>

  <div id="notificationContainer" class="notif-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script src="js/navigation.js"></script>
  <script src="js/archived-appointments.js"></script>
</body>
</html>
